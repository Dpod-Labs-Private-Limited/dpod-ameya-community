  APPFLYTE_BACKEND_URL: http://ameya-backend-service:8000
  APPFLYTE_SCHEMA_ID: "ameya_appflyte"
  S3_ENDPOINT_URL: http://minio.localhost:8080
  DYNAMODB_ACCESS_KEY: "admin"
  DYNAMODB_SECRET_KEY: "admin123"
  DYNAMODB_ENDPOINT_URL: http://dynamodb:8000
  MONGO_DB_DATABASE: extraction-analytics
  CELERY_BROKER_URL: amqp://ameya-rabbitmq:5672//
  CELERY_RESULT_BACKEND: redis://ameya-redis:6379/0
  RABBIT_HOST: ameya-rabbitmq
