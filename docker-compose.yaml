  APPFLYTE_AUTHORIZATION_URL: "ameya-authorization-service:50052"
  LOCAL_TESTING_ENABLED: "true"
  REDIS_HOST: ameya-redis
  REDIS_PORT: "6379"
  DEPLOYMENT_MODE: "community"

