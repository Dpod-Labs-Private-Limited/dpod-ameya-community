  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  MONGODB_URI: "mongodb://admin:admin123456@mongodb:27017/?authSource=admin&directConnection=true"
  S3_BUCKET_NAME: "dpod-aws-s3"
  EXTRACTION_SERVICE_URL: http://api.localhost:8080/entityextractionagent
  ANALYTICS_SERVICE_URL:  http://api.localhost:8080/ameya/analytics/v1
  ANALYTICS_CHATBOT_PLUGIN_URL: "https://dev-test-ameya-analytics-chatbot.ameya.ai"
  APPFLYTE_ANALYTICS_CHATBOT_PLUGIN_URL: "https://dev-test-appflyte-analytics-chatbot.ameya.ai"
  MONGO_DB_DATABASE: extraction-analytics
  MINIO_ENDPOINT: http://minio.localhost:8080
  MINIO_ACCESS_KEY: "admin"
