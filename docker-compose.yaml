services:
  # DPOD auth-server (authentication)
  ameya-authentication-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-auth:v1.1.0
    container_name: ameya-authentication-service
    expose:
      - 5000
    environment:
      <<: [*ameya-env, *common-env]
    restart: always
    depends_on:
      ameya-redis:
        condition: service_healthy
      ameya-rabbitmq:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
    healthcheck:
      # TCP liveness: app is up and listening on 5000. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',5000),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - ameya_community_network

  # DPOD auth-server (authorization / gRPC)
  ameya-authorization-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-authz:v1.1.0
    container_name: ameya-authorization-service
    environment:
      <<: [*ameya-env, *common-env]
    expose:
      - 50052
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      ameya-authentication-service:
        condition: service_healthy
    restart: always
    networks:
      - ameya_community_network 

  # DPOD backend API
  ameya-backend-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-backend:v1.1.0
    container_name: ameya-backend-service
    # Resolve the browser-facing proxy hosts from inside the container too
    # (libc won't query Docker DNS for *.localhost). Routes via the host to Caddy.
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    expose:
      - 8000
    environment:
      <<: [*ameya-env, *common-env]
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      ameya-authentication-service:
        condition: service_healthy
    healthcheck:
      # TCP liveness: backend up and listening on 8000. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',8000),3).close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      - ameya_community_network
  # Celery worker
  ameya-celery-worker:
    image: ghcr.io/dpod-labs-private-limited/ameya-celery:v1.1.0  
    container_name: ameya-celery-worker
    extra_hosts: *extra-hosts
    environment:
      <<: [*ameya-env, *common-env]
    depends_on:
      ameya-backend-service:
        condition: service_healthy
    networks:
      - ameya_community_network 
    restart: always
  # Redis
  ameya-redis:
    image: "redis:alpine"
    container_name: ameya-redis
    networks:
      - ameya_community_network 
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # RabbitMQ
  ameya-rabbitmq:
    image: "rabbitmq:3.12.1-management"
    container_name: ameya-rabbitmq
    networks:
      - ameya_community_network 
    expose:
      - 5672
      - 15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

    # DynamoDB Admin UI
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    expose:
      - 8001
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
    depends_on:
      dynamodb:
        condition: service_healthy
    networks:
      - ameya_community_network
    restart: always
  # DynamoDB
  # Bootstrap — runs once: creates the DynamoDB table and the MinIO bucket if they don't exist
  dynamodb-init:
    image: ghcr.io/dpod-labs-private-limited/community-init:v1.1.0
    container_name: dynamodb-init
    depends_on:
      dynamodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DYNAMODB_ENDPOINT_URL=http://dynamodb:8000
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=dpod-aws-s3
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin123
      - AWS_DEFAULT_REGION=us-east-1
      - LICENSE_TOKEN=${LICENSE_TOKEN}
    networks:
      - ameya_community_network 
    restart: "no"
  # DynamoDB (local) — does not authenticate; with -sharedDb it ignores AWS creds
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
    user: root
    expose:
      - 8000
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    healthcheck:
      # HTTP liveness: DynamoDB Local answers on 8000 (GET / -> 400 = up). Image has curl.
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ameya_community_network
    restart: always
# # MongoDB Database
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: mongodb
    hostname: mongodb
    environment:
      MONGODB_INITDB_ROOT_USERNAME: admin
      MONGODB_INITDB_ROOT_PASSWORD: admin123456
      MONGODB_INITDB_DATABASE: admin
    expose:
      - 27017
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - ameya_community_network 
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Mongo Express - MongoDB UI
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_ui
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin12345
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123456@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    expose:
      - 8081
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ameya_community_network 
    restart: always
  # Minio
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123
    expose:
      - 9000
      - 9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ameya_community_network
    restart: always


  # Extraction-plugin
  training_plugin:
    image: ghcr.io/dpod-labs-private-limited/extraction-plugin:v1.1.0
    container_name: training_plugin
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    expose:
      - 80
    networks:
      - ameya_community_network 
    restart: always

  # Extraction Service API
  extraction-service:
    image: ghcr.io/dpod-labs-private-limited/extraction-service:v1.1.1
    container_name: extraction-service
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      extraction-rabbitmq:
        condition: service_healthy
    environment:
      <<: [*extraction-env, *common-env]
    expose:
      - 8000
    volumes:
      - uploads_data:/app/shared/uploads
      - parsed_docs:/app/shared/parsed
      - extraction_output:/app/shared/extracted
      - extracted_layouts:/app/shared/extracted_layouts
    restart: always
    networks:
      - ameya_community_network 
  # extraction RabbitMQ
  extraction-rabbitmq:
    image: "rabbitmq:3.12.1-management"
    container_name: extraction-rabbitmq
    networks:
      - ameya_community_network 
    expose:
      - 5672
      - 15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  # Extraction Celery Worker
  extraction-celery-worker:
    image: ghcr.io/dpod-labs-private-limited/extraction-service:v1.1.1
    container_name: extraction-celery
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    environment:
      <<: [*extraction-env, *common-env]
      APP_MODE: worker
    volumes:
      - uploads_data:/app/shared/uploads
      - parsed_docs:/app/shared/parsed
      - extraction_output:/app/shared/extracted
      - extracted_layouts:/app/shared/extracted_layouts
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      extraction-rabbitmq:
        condition: service_healthy
    networks:
      - ameya_community_network 
    restart: always
  # analytics service API
  analytics-api:
    image: ghcr.io/dpod-labs-private-limited/analytics-service-api:v1.1.0
    container_name: analytics-api
    environment:
      <<: [*analytics-env, *common-env]
    expose:
      - 8087
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    restart: always
    healthcheck:
      # HTTP liveness matching the k8s probe: GET /ameya/analytics/v1/docs on 8087.
      # (Image has python, no curl — use urllib.)
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8087/ameya/analytics/v1/docs',timeout=25).status==200 else 1)"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 500s
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      analytics-rabbitmq:
        condition: service_healthy
    networks:
      - ameya_community_network
  # analytics RabbitMQ
  analytics-rabbitmq:
    image: "rabbitmq:3.12.1-management"
    container_name: analytics-rabbitmq
    networks:
      - ameya_community_network
    expose:
      - 5672
      - 15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  # Analytics Celery Beat
  analytics-celery-beat:
    image: ghcr.io/dpod-labs-private-limited/analytics-service-celery:v1.1.0
    container_name: analytics-celery-beat
    environment:
      APP_MODE: beat
      <<: [*analytics-env, *common-env]
    depends_on:
      analytics-rabbitmq:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network
  # analytics Celery Worker
  analytics-celery-worker:
    image: ghcr.io/dpod-labs-private-limited/analytics-service-celery:v1.1.0
    container_name: analytics-celery
    environment:
      APP_MODE: worker
      <<: [*analytics-env, *common-env]
    depends_on:
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network  
    restart: always

  #Analytics Mongo server
  analytics-mongo-server:
    image: ghcr.io/dpod-labs-private-limited/mongo-server:v1.1.0
    container_name: analytics-mongo-server
    expose:
      - 9010
    environment:
      <<: [*mongo-env, *common-env]
    healthcheck:
      # TCP liveness: app is up and listening on 9010. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',9010),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network  
    restart: always
  #Analytics Mongo consumer
  analytics-mongo-consumer:
    image: ghcr.io/dpod-labs-private-limited/mongo-consumer:v1.1.0
    container_name: analytics-mongo-consumer
    environment:
      <<: [*mongo-env, *common-env]
    depends_on:
      analytics-api:
        condition: service_healthy
      analytics-mongo-server:
        condition: service_healthy
    networks:
      - ameya_community_network  
    restart: always
# Analytics excel-server
  analytics-excel-server:
    image: ghcr.io/dpod-labs-private-limited/excel-server:v1.1.0
    container_name: analytics-excel-server
    expose:
      - 9011
    environment:
      <<: [*analytics-env, *common-env, *excel-env]
    volumes:
      - excel-data:/app/data
    healthcheck:
      # TCP liveness: app is up and listening on 9011. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',9011),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network
    restart: always
  # Analytics excel-consumer
  analytics-excel-consumer:
    image: ghcr.io/dpod-labs-private-limited/excel-consumer:v1.1.0
    container_name: analytics-excel-consumer
    environment:
      <<: [*analytics-env, *common-env, *excel-env]
    volumes:
      - excel-data:/app/data
    depends_on:
      analytics-excel-server:
        condition: service_healthy
    networks:
      - ameya_community_network
    restart: always

# File mcp consumer
  analytics-file-consumer:
    image: ghcr.io/dpod-labs-private-limited/file-consumer:v1.1.0
    container_name: analytics-file-consumer
    environment:
      <<: [*analytics-env, *common-env]
      FILE_MCP_SERVER_URL: "http://analytics-file-server:9009"
    depends_on:
      analytics-file-server:
        condition: service_healthy
    networks:
      - ameya_community_network
    restart: always
  #file mcp server
  analytics-file-server:
    image: ghcr.io/dpod-labs-private-limited/file-server:v1.1.0
    container_name: analytics-file-server
    expose:
      - 9009
    environment:
      <<: [*analytics-env, *common-env]
      FILE_MCP_SERVER_URL: "http://analytics-file-server:9009"
    healthcheck:
      # TCP liveness: app is up and listening on 9009. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',9009),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network
    restart: always
    # monitoring-service
  monitoring-service:
    image: ghcr.io/dpod-labs-private-limited/monitoring-service:v1.1.0
    container_name: monitoring-service
    expose:
      - 9056
    environment:
      <<: [*common-env, *analytics-env, *monitoring-env]
    healthcheck:
      # TCP liveness: backend up and listening on 9056. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',9056),3).close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      analytics-excel-server:
        condition: service_healthy
      analytics-file-server:
        condition: service_healthy
    restart: always
    networks:
      - ameya_community_network
  # minio-monitor
  minio-monitor:
    image: ghcr.io/dpod-labs-private-limited/minio-monitor:v1.1.0
    container_name: minio-monitor
    expose:
      - 9070
    environment:
      <<: [*common-env, *analytics-env, *monitoring-env]
    healthcheck:
      # TCP liveness: monitor up and listen`ing on 9070. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',9070),3).close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      minio:
        condition: service_healthy
    restart: always
    networks:
      - ameya_community_network
  # One-shot bootstrap: registers the webhook target on the existing MinIO and
  # wires the bucket events. Safe to re-run.
  minio-bootstrap:
    image: minio/mc:latest
    container_name: community-minio-bootstrap
    depends_on:
      minio-monitor:
        condition: service_healthy
    environment:
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=dpod-aws-s3
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin123
      - MINIO_MONITOR_ENDPOINT=http://minio-monitor:9070/minio/events
      - STORAGE_PATH=monitoring_service/file_analytics/env_data/community/
    networks:
      - ameya_community_network
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local $$S3_ENDPOINT_URL $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY
        mc admin config set local notify_webhook:ANALYTICS endpoint="$$MINIO_MONITOR_ENDPOINT" enable=on
        mc admin service restart local --json || true
        sleep 5
        until mc ready local; do sleep 2; done
        mc mb -p local/$$S3_BUCKET_NAME || true
        mc event add local/$$S3_BUCKET_NAME arn:minio:sqs::ANALYTICS:webhook --event put,delete --prefix $$STORAGE_PATH || true
        mc event ls local/$$S3_BUCKET_NAME arn:minio:sqs::ANALYTICS:webhook
        echo "minio-bootstrap: webhook + bucket events wired successfully for local/$$S3_BUCKET_NAME (prefix $$STORAGE_PATH)"
    restart: "no"

# Caddy reverse proxy — single origin (http://localhost) for frontend + APIs
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ameya_community_network
    restart: always

  # DPOD ameya-web (frontend)
  ameya-web-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-frontend:v1.1.0
    container_name: ameya-web-service
    expose:
      - 3000
    environment:
      <<: [*web-env, *common-env]
      # Browser-facing URLs — one subdomain per service via the Caddy proxy.
      # (The browser must resolve *.localhost; Safari needs /etc/hosts entries.)
    networks:
      - ameya_community_network
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    restart: always
    healthcheck:
      # TCP liveness: Next.js frontend up and listening on 3000. (Node image, no curl.)
      test: ["CMD", "node", "-e", "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      analytics-api:
        condition: service_healthy

 # parser-service api
  parser-api:
    image: ghcr.io/dpod-labs-private-limited/parser-service-api:v1.1.0
    container_name: parser-api
    # Memory-heavy (loads Marker OCR models). Gated behind the "parser" profile —
    # not started by a plain `docker compose up`. Enable with:
    #   docker compose --profile parser up -d
    profiles: ["parser"]
    expose:
      - 9090
    environment:
      <<: [*parser-env, *common-env]
    healthcheck:
      # TCP liveness: backend up and listening on 9090. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',9090),3).close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    depends_on:
      parser-rabbitmq:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network
  # parser rabbitmq
  parser-rabbitmq:
    image: "rabbitmq:3.12.1-management"
    container_name: parser-rabbitmq
    profiles: ["parser"]
    networks:
      - ameya_community_network 
    expose:
      - 5672
      - 15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  # parser-service consumer
  parser-consumer:
    image: ghcr.io/dpod-labs-private-limited/parser-service-consumer:v1.1.0
    container_name: parser-consumer
    profiles: ["parser"]
    shm_size: 1g
    environment:
      <<: [*parser-env, *common-env]
    # Persist the Marker/Surya OCR models (~2 GB) across restarts so they aren't
    # re-downloaded every start. Mounted at $HOME/.cache (owner nonroot/65532);
    volumes:
      - parser-models:/home/nonroot/.cache
    depends_on:
      parser-api:
        condition: service_healthy
    networks:
      - ameya_community_network
    restart: always

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  redis-data:
  rabbitmq-data:
  dynamodb-data:
  minio-data:
  mongodb_data:
  mongodb_config:
  uploads_data:
  parsed_docs:
  extraction_output:
  extracted_layouts:
  caddy-data:
  caddy-config:
  excel-data:
  parser-models:

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  ameya_community_network:
    external: true
