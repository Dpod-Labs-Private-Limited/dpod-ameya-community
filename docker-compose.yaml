  EXTRACTION_SCHEMA_BUILDER_PLUGIN_URL: http://plugin.localhost:8080/schema-builder

x-extraction-env: &extraction-env
  RABBIT_HOST: extraction-rabbitmq
  CELERY_BROKER_URL: pyamqp://guest@extraction-rabbitmq//
  LLM_MODEL: gemini-2.5-flash
  LLM_PROVIDER: google

x-analytics-env: &analytics-env
  MONGODB_USER_DB: user-master
  MONGODB_MONGO_INDEX_DB: index-master
  MONGODB_PDF_INDEX_DB: ameya-analytics-pdf
  PDF_PARSER_HOST_URL: "http://analytics-pdf-parser:8080"
  RABBITMQ_HOST: "analytics-rabbitmq"
  RABBITMQ_PORT: 5672
  CELERY_BROKER_URL: redis://ameya-redis:6379/0
  CELERY_RESULT_BACKEND: redis://ameya-redis:6379/1
  ENGINE: "ameya-analytics"

x-consumer-env: &consumer-env
  MONGO_USER_DB: user-master
  MONGO_INDEX_DB: index-master
  MONGO_SESSION_DB: session-master
  OPENAI_EMBEDDING_MODEL: text-embedding-3-small
  RABBITMQ_HOST: "analytics-rabbitmq"
  MONGO_MCP_SERVER_URL: "http://analytics-mongo-server:9010"
  ENABLE_CONTEXT_COMPRESSION: "true"
  SYSTEM_IDENTITY_PATH: src/config/system_identity.json
  SKILLS_DIR: src/config/20260330_163909/skills


services:
  # DPOD auth-server (authentication)
  ameya-authentication-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-auth:v1.1.0
    container_name: ameya-authentication-service
    expose:
      - 5000
    environment:
      <<: [*ameya-env, *common-env]
    restart: always
    depends_on:
      ameya-redis:
        condition: service_healthy
      ameya-rabbitmq:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
    healthcheck:
      # TCP liveness: app is up and listening on 5000. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',5000),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - ameya_community_network

  # DPOD auth-server (authorization / gRPC)
  ameya-authorization-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-authz:v1.1.0
    container_name: ameya-authorization-service
    environment:
      <<: [*ameya-env, *common-env]
    expose:
      - 50052
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      ameya-authentication-service:
        condition: service_healthy
    restart: always
    networks:
      - ameya_community_network 

  # DPOD backend API
  ameya-backend-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-backend:v1.1.0
    container_name: ameya-backend-service
    # Resolve the browser-facing proxy hosts from inside the container too
    # (libc won't query Docker DNS for *.localhost). Routes via the host to Caddy.
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    expose:
      - 8000
    environment:
      <<: [*ameya-env, *common-env]
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      ameya-authentication-service:
        condition: service_healthy
    healthcheck:
      # TCP liveness: backend up and listening on 8000. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',8000),3).close()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s
    networks:
      - ameya_community_network
  # Celery worker
  ameya-celery-worker:
    image: ghcr.io/dpod-labs-private-limited/ameya-celery:v1.1.0  
    container_name: ameya-celery-worker
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    environment:
      <<: [*ameya-env, *common-env]
    depends_on:
      ameya-backend-service:
        condition: service_healthy
    networks:
      - ameya_community_network 
    restart: always
  # Redis
  ameya-redis:
    image: "redis:alpine"
    container_name: ameya-redis
    networks:
      - ameya_community_network 
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # RabbitMQ
  ameya-rabbitmq:
    image: "rabbitmq:3.12.1-management"
    container_name: ameya-rabbitmq
    networks:
      - ameya_community_network 
    expose:
      - 5672
      - 15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

    # DynamoDB Admin UI
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    expose:
      - 8001
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
    depends_on:
      dynamodb:
        condition: service_healthy
    networks:
      - ameya_community_network
    restart: always
  # DynamoDB
  # Bootstrap — runs once: creates the DynamoDB table and the MinIO bucket if they don't exist
  dynamodb-init:
    image: ghcr.io/dpod-labs-private-limited/community-init:v1.1.0
    container_name: dynamodb-init
    depends_on:
      dynamodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      - DYNAMODB_ENDPOINT_URL=http://dynamodb:8000
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_BUCKET_NAME=dpod-aws-s3
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin123
      - AWS_DEFAULT_REGION=us-east-1
      - LICENSE_TOKEN=${LICENSE_TOKEN}
    networks:
      - ameya_community_network 
    restart: "no"
  # DynamoDB (local) — does not authenticate; with -sharedDb it ignores AWS creds
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
    user: root
    expose:
      - 8000
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    healthcheck:
      # HTTP liveness: DynamoDB Local answers on 8000 (GET / -> 400 = up). Image has curl.
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - ameya_community_network
    restart: always
# # MongoDB Database
  mongodb:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: mongodb
    hostname: mongodb
    environment:
      MONGODB_INITDB_ROOT_USERNAME: admin
      MONGODB_INITDB_ROOT_PASSWORD: admin123456
      MONGODB_INITDB_DATABASE: admin
    expose:
      - 27017
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - ameya_community_network 
    restart: always
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Mongo Express - MongoDB UI
  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_ui
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin12345
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123456@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    expose:
      - 8081
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ameya_community_network 
    restart: always
  # Minio
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123
    expose:
      - 9000
      - 9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ameya_community_network
    restart: always


  # Extraction-plugin
  training_plugin:
    image: ghcr.io/dpod-labs-private-limited/extraction-plugin:v1.1.0
    container_name: training_plugin
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    expose:
      - 80
    networks:
      - ameya_community_network 
    restart: always

  # Extraction Service API
  extraction-service:
    image: ghcr.io/dpod-labs-private-limited/extraction-service:v1.1.0
    container_name: extraction-service
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      extraction-rabbitmq:
        condition: service_healthy
    environment:
      <<: [*extraction-env, *common-env]
    expose:
      - 8000
    volumes:
      - uploads_data:/app/shared/uploads
      - parsed_docs:/app/shared/parsed
      - extraction_output:/app/shared/extracted
      - extracted_layouts:/app/shared/extracted_layouts
    restart: always
    networks:
      - ameya_community_network 
  # extraction RabbitMQ
  extraction-rabbitmq:
    image: "rabbitmq:3.12.1-management"
    container_name: extraction-rabbitmq
    networks:
      - ameya_community_network 
    expose:
      - 5672
      - 15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  # Extraction Celery Worker
  extraction-celery-worker:
    image: ghcr.io/dpod-labs-private-limited/extraction-service:v1.1.0
    container_name: extraction-celery
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    environment:
      <<: [*extraction-env, *common-env]
      APP_MODE: worker
    volumes:
      - ./logs:/app/logs
      - uploads_data:/app/shared/uploads
      - parsed_docs:/app/shared/parsed
      - extraction_output:/app/shared/extracted
      - extracted_layouts:/app/shared/extracted_layouts
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      extraction-rabbitmq:
        condition: service_healthy
    networks:
      - ameya_community_network 
    restart: always
  # analytics service API
  analytics-api:
    image: ghcr.io/dpod-labs-private-limited/analytics-service-api:v1.1.0
    container_name: analytics-api
    environment:
      <<: [*analytics-env, *common-env]
    expose:
      - 8087
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    restart: always
    healthcheck:
      # HTTP liveness matching the k8s probe: GET /ameya/analytics/v1/docs on 8087.
      # (Image has python, no curl — use urllib.)
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8087/ameya/analytics/v1/docs',timeout=25).status==200 else 1)"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 500s
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      analytics-rabbitmq:
        condition: service_healthy
    networks:
      - ameya_community_network
  # analytics RabbitMQ
  analytics-rabbitmq:
    image: "rabbitmq:3.12.1-management"
    container_name: analytics-rabbitmq
    networks:
      - ameya_community_network
    expose:
      - 5672
      - 15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
  # Analytics Celery Beat
  analytics-celery-beat:
    image: ghcr.io/dpod-labs-private-limited/analytics-service-celery:v1.1.0
    container_name: analytics-celery-beat
    environment:
      APP_MODE: beat
      <<: [*analytics-env, *common-env]
    depends_on:
      analytics-rabbitmq:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network
  # analytics Celery Worker
  analytics-celery-worker:
    image: ghcr.io/dpod-labs-private-limited/analytics-service-celery:v1.1.0
    container_name: analytics-celery
    environment:
      APP_MODE: worker
      <<: [*analytics-env, *common-env]
    depends_on:
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network  
    restart: always

  #Analytics Mongo server
  analytics-mongo-server:
    image: ghcr.io/dpod-labs-private-limited/mongo-server:v1.1.0
    container_name: analytics-mongo-server
    expose:
      - 9010
    environment:
      <<: [*consumer-env, *common-env]
    healthcheck:
      # TCP liveness: app is up and listening on 9010. (Image has python, no shell.)
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1',9010),3).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      analytics-api:
        condition: service_healthy
    networks:
      - ameya_community_network  
    restart: always
  #Analytics Mongo consumer
  analytics-mongo-consumer:
    image: ghcr.io/dpod-labs-private-limited/mongo-consumer:v1.1.0
    container_name: analytics-mongo-consumer
    environment:
      <<: [*consumer-env, *common-env]
    depends_on:
      analytics-api:
        condition: service_healthy
      analytics-mongo-server:
        condition: service_healthy
    networks:
      - ameya_community_network  
    restart: always

# Caddy reverse proxy — single origin (http://localhost) for frontend + APIs
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ameya_community_network
    restart: always

  # DPOD ameya-web (frontend)
  ameya-web-service:
    image: ghcr.io/dpod-labs-private-limited/ameya-frontend:v1.1.0
    container_name: ameya-web-service
    expose:
      - 3000
    environment:
      <<: [*web-env, *common-env]
      # Browser-facing URLs — one subdomain per service via the Caddy proxy.
      # (The browser must resolve *.localhost; Safari needs /etc/hosts entries.)
    networks:
      - ameya_community_network
    extra_hosts:
      - "minio.localhost:host-gateway"
      - "extraction.localhost:host-gateway"
    restart: always
    healthcheck:
      # TCP liveness: Next.js frontend up and listening on 3000. (Node image, no curl.)
      test: ["CMD", "node", "-e", "require('net').connect(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      ameya-backend-service:
        condition: service_healthy
      analytics-api:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  redis-data:
  rabbitmq-data:
  dynamodb-data:
  minio-data:
  mongodb_data:
  mongodb_config:
  uploads_data:
  parsed_docs:
  extraction_output:
  extracted_layouts:
  caddy-data:
  caddy-config:

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  ameya_community_network:
    external: true
